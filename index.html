<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowDesk — Productivity Suite</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  /* New Figma Colors */
  --bg: #E1EDF5;
  --surface: #FFFFFF;
  --surface2: #EEEEEE;
  --surface3: #DDDDDD;
  --border: #AAAAAA;
  --border-dark: #888888;
  
  --accent: #0099FF;
  --accent-light: #9FC7E1;
  --accent-green: #02BB02;
  
  --danger: #FF0000;
  --danger-bg: #E7D6DC;
  
  --text: #000000;
  --text2: #666666;
  --text3: #888888;
  
  --radius: 10px;
  --shadow: 0px 4px 50px rgba(0, 0, 0, 0.1);
  
  --todo: #333333;
  --inprog: #0099FF;
  --done: #00FF00;
}

html.dark {
  /* Inverse for dark mode if toggled */
  --bg: #1a1e28;
  --surface: #222738;
  --surface2: #2a3045;
  --surface3: #3b425d;
  --border: #4b5280;
  --border-dark: #5c6480;
  --text: #e8eaf0;
  --text2: #9ba3bf;
  --text3: #9097b8;
}

html.dark .ql-editor{background:var(--surface);color:var(--text)}
html.dark .ql-toolbar.ql-snow{background:var(--surface2)}
html.dark .sheet-table th{background:var(--surface2)}
html.dark .sheet-table td{background:var(--surface)}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;background:var(--bg);color:var(--text);font-size:15px;}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:99px}

/* DOCS */
#docs-view { padding: 30px; height: 100%; overflow: auto; background: var(--bg); }
.doc-editor-wrap {
  max-width: 1156px;
  margin: 0 auto;
  background: var(--surface);
  border: 4px solid var(--text);
  border-radius: 15px;
  overflow: hidden;
}
.doc-editor-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--surface2);
  border-bottom: 1px solid var(--border-dark);
  padding: 15px 30px;
  display: flex;
  align-items: center;
  gap: 15px;
}
.doc-editor-title {
  flex: 1;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text);
  font-size: 25px;
  font-weight: 400;
  outline: none;
  padding: 5px;
}
.ql-editor { min-height: 800px; padding: 40px 60px !important; font-size: 15px; line-height: 1.5; color: var(--text2); }
.ql-toolbar.ql-snow { position: sticky; top: 68px; z-index: 9; background: var(--surface2) !important; border-color: var(--border) !important; }
.ql-container.ql-snow { border-color: var(--border) !important; border-top: none; }

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:250px;min-width:250px;background:var(--surface2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s; padding: 30px 15px;}
#sidebar.collapsed{width:80px;min-width:80px; padding:30px 10px;}
#sidebar.collapsed .hide-collapsed{display:none}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#topbar{height:120px;background:var(--bg);display:flex;align-items:center;padding:10px 30px;gap:25px;flex-shrink:0}
#content{flex:1;overflow:auto;background:var(--bg); padding: 0 30px 30px 30px;}

/* SIDEBAR */
.sidebar-logo{padding:0 10px 30px;display:flex;align-items:center;gap:10px;}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.logo-text{font-weight:700;font-size:20px;white-space:nowrap}
.logo-sub{font-size:12px;color:var(--text3);font-weight:400}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:15px;overflow-y:auto}
.nav-section{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:10px;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:15px;padding:12px 15px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--text2);white-space:nowrap;overflow:hidden;border:none;background:none;width:100%;text-align:left;font-size:18px;}
.nav-item:hover{background:var(--surface3);color:var(--text)}
.nav-item.active{background:var(--surface);color:var(--text);border: 1px solid var(--border); font-weight:700;}
.nav-item i{width:22px;text-align:center;font-size:18px;flex-shrink:0}
.sidebar-bottom{padding-top:20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.sidebar-btn{display:flex;align-items:center;gap:15px;padding:10px;border-radius:10px;cursor:pointer;color:var(--text2);border:none;background:none;width:100%;font-size:15px;white-space:nowrap}
.sidebar-btn:hover{color:var(--text);background:var(--surface3)}

/* TOPBAR */
#topbar h1{font-size:30px;font-weight:700;flex:1;color:var(--text);}
.topbar-btn{padding:15px 25px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;display:flex;align-items:center;gap:10px;transition:all .15s;white-space:nowrap}
.topbar-btn:hover{background:var(--surface2);}
.topbar-btn.primary{background:rgba(0, 153, 255, 0.2);border-color:var(--accent);color:var(--accent); font-weight: 400;}
.topbar-btn.primary:hover{background:rgba(0, 153, 255, 0.3);}
.topbar-btn.danger{background:rgba(255, 0, 0, 0.2); border-color: var(--danger); color: var(--danger);}

.clock-mini, .topbar-qtimer {
  background: var(--accent);
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
  border: none;
}
.topbar-qtimer { cursor: pointer; transition: all 0.15s; }
.topbar-qtimer.running { background: var(--accent-light); color: var(--text); }
.topbar-qtimer.paused { background: var(--surface3); color: var(--text); }
.topbar-qtimer .qt-dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; }

/* VIEWS */
.view{display:none;height:100%;overflow:auto}
.view.active{display:block}

/* KANBAN */
.kanban-board{display:flex;gap:30px;align-items:flex-start;min-height:100%}
.kanban-col{flex:1;min-width:350px;max-width:500px;background:var(--surface);border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column}
.col-header{padding:15px;display:flex;align-items:center;gap:15px;border-bottom:1px solid var(--border)}
.col-dot{width:14px;height:14px;border-radius:50%}
.col-title{font-weight:400;font-size:25px;flex:1; color: var(--text);}
.col-count{background:var(--surface2);color:var(--text);font-size:15px;padding:4px 10px;border-radius:5px; border: 1px solid var(--border-dark);}
.col-add-btn{background:none;border:none;color:var(--text);font-size:18px; cursor: pointer;}
.col-cards{padding:15px;display:flex;flex-direction:column;gap:15px;min-height:100px}
.task-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:15px;cursor:pointer;transition:all .15s}
.task-card:hover{border-color:var(--border-dark); box-shadow:var(--shadow)}
.task-title{font-size:20px;font-weight:400;margin-bottom:10px;line-height:1.2}
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-tag{font-size:14px;padding:4px 10px;border-radius:5px; border: 1px solid;}
.task-priority-high{background:var(--danger-bg);color:var(--danger); border-color: var(--danger);}
.task-priority-medium{background:#B8DFF9;color:var(--accent); border-color: var(--accent);}
.task-priority-low{background:#e6ffe6;color:var(--done); border-color: var(--done);}
.task-due{font-size:14px;color:var(--text);display:flex;align-items:center;gap:5px; background:var(--surface3); padding:4px 10px; border-radius:5px; border: 1px solid var(--border);}
.task-subtask-bar{margin-top:10px}
.subtask-progress{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:5px}
.subtask-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.subtask-label{font-size:12px;color:var(--text3)}
.col-add-card{margin:0 15px 15px;padding:15px;border:1px dashed var(--border-dark);border-radius:10px;background:var(--surface2);color:var(--text);font-size:18px;width:calc(100% - 30px);text-align:center;transition:all .15s; cursor: pointer;}
.col-add-card:hover{border-color:var(--text); background: var(--surface3);}

/* GLASS OVERLAY MODAL (From Figma Dump) */
.modal-overlay{position:fixed;inset:0;background:rgba(0, 0, 0, 0.4);z-index:1000;display:flex;align-items:center;justify-content:center; backdrop-filter: blur(5px);}
.modal{
  background: rgba(255, 255, 255, 0.1);
  border: 3px solid #FFFFFF;
  box-shadow: 0px 4px 100px rgba(0, 0, 0, 0.25), 0px 0px 50px rgba(0, 0, 0, 0.1);
  border-radius: 20px;
  backdrop-filter: blur(15px);
  width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.modal-header{padding:20px;display:flex;justify-content:space-between;align-items:center; gap:20px;}
.modal-title-input{
  background: #EEEEEE;
  border: 1px solid #888888;
  border-radius: 10px;
  color: #000000;
  font-size: 30px;
  padding: 10px 15px;
  width: 100%;
  outline: none;
}
.modal-close{background:none;border:none;color:#000;font-size:24px;padding:10px; cursor: pointer;}
.modal-body{padding:0 20px 20px; display:flex; flex-direction: column; gap: 20px;}
.modal-row{display:flex;gap:20px;flex-wrap:wrap; align-items: flex-start;}
.modal-field{display:flex;flex-direction:column;gap:5px;flex:1;}
.modal-label{font-size:15px;color:#888888;}
.modal-select,.modal-input{background:#EEEEEE;border:1px solid #AAAAAA;border-radius:5px;padding:10px;color:#000000;font-size:15px;outline:none;width:100%;}
.modal-textarea{background:#EEEEEE;border:1px solid #888888;border-radius:5px;padding:10px;color:#000000;font-size:15px;outline:none;width:100%;min-height:80px; resize:vertical;}
.modal-footer{padding:20px;display:flex;justify-content:flex-end;gap:15px;}

.subtask-item, .attachment-item, .reminder-item {
  display: flex; align-items: center; gap: 10px; padding: 10px; background: #EEEEEE; border: 1px solid #888888; border-radius: 5px; margin-bottom: 5px;
}
.subtask-text, .attachment-name, .reminder-text { flex: 1; font-size: 15px; color: #000; }
.subtask-delete { background: none; border: none; color: #888; cursor: pointer; }

/* SHEETS */
.sheets-grid-wrap{background:var(--surface);border:4px solid var(--text);border-radius:15px;overflow:hidden; max-width: 1156px; margin: 0 auto;}
.sheets-editor-header{padding:15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:15px; background:var(--surface2);}
.sheets-editor-title{flex:1;background:var(--surface);border:1px solid var(--border-dark);color:var(--text);font-size:20px;outline:none;border-radius:5px;padding:10px;}
#sheet-container{overflow:auto;max-height:calc(100vh - 350px); background:var(--surface);}
.sheet-table{border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:14px;min-width:100%}
.sheet-table th,.sheet-table td{border:1px solid var(--border-dark);min-width:100px;height:35px;padding:0 10px}
.sheet-table th{background:var(--surface3);color:var(--text);font-weight:400;text-align:center;position:sticky;top:0;z-index:1}
.sheet-table th.row-header{width:50px;min-width:50px;position:sticky;left:0;z-index:2;background:var(--surface3)}
.sheet-table td{background:var(--surface);color:var(--text);cursor:cell;}
.sheet-table td.selected{background:var(--accent-light);outline:2px solid var(--accent)}
.sheet-formula-bar{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2)}
.cell-ref{width:60px;padding:5px;background:var(--surface3);border:1px solid var(--border-dark);border-radius:5px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;text-align:center}
.formula-input{flex:1;background:var(--surface);border:1px solid var(--border-dark);border-radius:5px;padding:5px 10px;outline:none;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px}

/* CALENDAR */
.cal-toolbar{display:flex;align-items:center;gap:20px;margin-bottom:20px;background:var(--surface);padding:15px 20px;border-radius:10px;border:1px solid var(--border)}
.cal-nav-btn{padding:8px 15px;border-radius:5px;border:1px solid var(--border-dark);background:var(--surface2);color:var(--text);font-size:15px;}
.cal-title{font-size:25px;font-weight:700;flex:1;text-align:center;color:var(--text);}
.cal-grid{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden; display:flex; flex-direction:column; flex:1;}
.cal-month-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:auto repeat(6,1fr)}
.cal-day-header{padding:15px;text-align:center;font-size:16px;font-weight:700;color:var(--text);background:var(--surface2);border-bottom:1px solid var(--border-dark)}
.cal-day{min-height:100px;border-right:1px solid var(--border-dark);border-bottom:1px solid var(--border-dark);padding:10px;}
.cal-day.today{background:var(--surface3);}
.cal-day-num{font-size:16px;font-weight:700;margin-bottom:5px;color:var(--text)}
.cal-day.other-month .cal-day-num{color:var(--text3)}
.cal-event{font-size:12px;padding:4px 8px;border-radius:4px;margin-bottom:4px;cursor:pointer; border:1px solid var(--border-dark); background:var(--surface2); color:var(--text);}

/* CLOCK & TIMER VIEWS */
.clock-display{text-align:center;margin: 50px 0;}
.clock-time{font-family:'IBM Plex Mono',monospace;font-size:80px;font-weight:700;color:var(--text);}
.timer-ring{width:300px;height:300px;position:relative;margin:0 auto 30px}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:var(--surface3);stroke-width:12}
.timer-ring-fg{fill:none;stroke:var(--accent);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .5s}
.timer-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:60px;font-weight:700;color:var(--text)}

/* MISC */
.empty-state{text-align:center;padding:50px;color:var(--text3);font-size:18px;}
.notification-toast{position:fixed;bottom:30px;right:30px;background:var(--surface);border:2px solid var(--text);border-radius:10px;padding:15px 25px;font-size:16px;font-weight:700;box-shadow:var(--shadow);z-index:9999;}
.btn{padding:10px 20px;border-radius:5px;font-size:15px;border:1px solid var(--border-dark);background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Docs grid */
.docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 20px; }
.doc-card { background: var(--surface); border: 1px solid var(--border-dark); border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.15s; }
.doc-card:hover { border-color: var(--accent); background: var(--surface2); }
.doc-card-title { font-size: 20px; font-weight: 700; margin: 10px 0; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css">
</head>
<body>

<div id="auth-screen" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:50px;text-align:center;width:400px;box-shadow:var(--shadow)">
    <div style="font-size:35px;font-weight:700;margin-bottom:10px;color:var(--text);">FlowDesk</div>
    <div style="font-size:16px;color:var(--text3);margin-bottom:40px;">Sign in to sync across devices.</div>
    <button onclick="signInWithGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border-radius:10px;border:1px solid var(--border-dark);background:var(--surface2);color:var(--text);font-size:18px;font-weight:700;cursor:pointer">
      Continue with Google
    </button>
    <div id="auth-loading" style="display:none;color:var(--text3);font-size:15px;margin-top:20px">Signing in...</div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div>
      <div class="sidebar-logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text hide-collapsed">FlowDesk</div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section hide-collapsed">Workspace</div>
        <button class="nav-item active" onclick="showView('kanban')"><i class="fas fa-columns"></i><span class="hide-collapsed">Kanban</span></button>
        <button class="nav-item" onclick="showView('calendar')"><i class="fas fa-calendar-alt"></i><span class="hide-collapsed">Calendar</span></button>
        <div class="nav-section hide-collapsed">Create</div>
        <button class="nav-item" onclick="showView('docs')"><i class="fas fa-file-alt"></i><span class="hide-collapsed">Docs</span></button>
        <button class="nav-item" onclick="showView('sheets')"><i class="fas fa-table"></i><span class="hide-collapsed">Sheets</span></button>
        <div class="nav-section hide-collapsed">Tools</div>
        <button class="nav-item" onclick="showView('clock')"><i class="fas fa-clock"></i><span class="hide-collapsed">Clock</span></button>
        <button class="nav-item" onclick="showView('timer')"><i class="fas fa-hourglass-half"></i><span class="hide-collapsed">Timer</span></button>
      </div>
    </div>
    <div class="sidebar-bottom">
      <button class="sidebar-btn" onclick="toggleTheme()">
        <i class="fas fa-moon" id="theme-icon"></i>
        <span class="hide-collapsed" id="theme-label">Dark Mode</span>
      </button>
      <button class="sidebar-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i><span class="hide-collapsed">Collapse</span>
      </button>
      <div class="hide-collapsed" id="user-pill" style="display:none;align-items:center;gap:10px;padding:10px;border-top:1px solid var(--border);margin-top:10px">
        <span id="user-name" style="font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;"></span>
        <button onclick="signOut()" style="background:none;border:none;color:var(--danger);font-size:15px;cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <h1 id="view-title">Kanban View</h1>
      <div class="topbar-qtimer" id="topbar-qtimer">
        <div class="qt-dot" onclick="qtTimerClick()"></div>
        <input id="qt-input" type="text" value="25:00" style="background:none;border:none;outline:none;font-family:inherit;font-size:inherit;font-weight:inherit;color:inherit;width:70px;text-align:center;" onclick="event.stopPropagation()" onblur="qtInputCommit(this.value)" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <div class="clock-mini" id="topbar-clock">--:--:--</div>
      <button class="topbar-btn primary" id="topbar-action" onclick="topbarAction()"><i class="fas fa-plus"></i><span id="action-label"> New Task</span></button>
    </div>

    <div id="content">
      <div id="kanban-view" class="view active">
        <div class="kanban-board" id="kanban-board"></div>
      </div>

      <div id="docs-view" class="view">
        <div style="display:flex;gap:15px;margin-bottom:30px;">
          <button class="topbar-btn primary" onclick="newDoc()">+ Add Doc</button>
          <button class="topbar-btn" onclick="docsBack()" id="docs-back-btn" style="display:none">Back</button>
        </div>
        <div id="docs-list"></div>
        <div id="docs-editor" style="display:none">
          <div class="doc-editor-wrap">
            <div class="doc-editor-header">
              <input class="doc-editor-title" id="doc-title" placeholder="Document Name" oninput="saveCurrentDoc()">
            </div>
            <div id="editor-container"></div>
          </div>
        </div>
      </div>

      <div id="sheets-view" class="view">
        <div style="display:flex;gap:15px;margin-bottom:30px;">
          <button class="topbar-btn primary" style="background:var(--accent-green);color:#fff;border-color:var(--accent-green);" onclick="newSheet()">+ Add Sheets</button>
          <button class="topbar-btn" onclick="sheetsBack()" id="sheets-back-btn" style="display:none">Back</button>
        </div>
        <div id="sheets-list"></div>
        <div id="sheets-editor" style="display:none">
          <div class="sheets-grid-wrap">
            <div class="sheets-editor-header">
              <input class="sheets-editor-title" id="sheet-title" placeholder="Sheet Name" oninput="saveData()" onblur="saveData()">
              <button class="btn" onclick="addSheetRow()">+ Row</button>
              <button class="btn" onclick="addSheetCol()">+ Col</button>
            </div>
            <div class="sheet-formula-bar">
              <div class="cell-ref" id="cell-ref">A1</div>
              <input class="formula-input" id="formula-input" placeholder="Value or Formula" oninput="formulaBarInput(this.value)" onkeydown="formulaBarKeyDown(event)">
            </div>
            <div id="sheet-container"></div>
          </div>
        </div>
      </div>

      <div id="calendar-view" class="view" style="display:flex; flex-direction:column; height: 100%;">
        <div class="cal-toolbar">

<script type="module">
// ===== FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, collection, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAX_9BmHxFiwjnjDX7x1RLs-S7D0vMts9A",
  authDomain: "flowdesk-60de3.firebaseapp.com",
  projectId: "flowdesk-60de3",
  storageBucket: "flowdesk-60de3.firebasestorage.app",
  messagingSenderId: "230629993875",
  appId: "1:230629993875:web:a1296e4eb6de524227cc66"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const provider = new GoogleAuthProvider();

let currentUser = null;

window.signInWithGoogle = async function() {
  try {
    document.getElementById('auth-loading').style.display = 'block';
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('auth-loading').style.display = 'none';
    toast('Sign in failed: ' + e.message, 'error');
  }
};
window.signOut = async function() {
  await fbSignOut(auth);
  location.reload();
};

async function fsLoad(col) {
  try {
    const snap = await getDocs(collection(db, `users/${currentUser.uid}/${col}`));
    return snap.docs.map(d => ({ ...d.data(), id: d.id }));
  } catch { return []; }
}
async function fsSave(col, id, data) {
  try { await setDoc(doc(db, `users/${currentUser.uid}/${col}/${id}`), data); } catch(e) { console.error(e); }
}
async function fsDelete(col, id) {
  try { await deleteDoc(doc(db, `users/${currentUser.uid}/${col}/${id}`)); } catch(e) { console.error(e); }
}
async function loadFromFirebase() {
  const [t, d, s, wc, ts] = await Promise.all([
    fsLoad('tasks'), fsLoad('docs'), fsLoad('sheets'), fsLoad('worldClocks'), fsLoad('timerSessions')
  ]);
  if (t.length) tasks = t;
  if (d.length) docs = d;
  if (s.length) sheets = s;
  if (wc.length) worldClocks = wc;
  if (ts.length) timerSessions = ts.sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
  LC.set('tasks', tasks); LC.set('docs', docs); LC.set('sheets', sheets);
  LC.set('worldClocks', worldClocks); LC.set('timerSessions', timerSessions);
}

window.fbSync = function(col, id, data) {
  if (!currentUser) return;
  fsSave(col, id, data);
}
window.fbDel = function(col, id) {
  if (!currentUser) return;
  fsDelete(col, id);
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const nm = document.getElementById('user-name'); if (nm) nm.textContent = user.displayName || user.email;
    const up = document.getElementById('user-pill'); if (up) up.style.display = 'flex';
    await loadFromFirebase();
    initApp();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});
</script>

<script>
// ===== LOCAL STORAGE =====
const LC = {
  get(k) { try { return JSON.parse(localStorage.getItem('fd_' + k)) || null } catch { return null } },
  set(k, v) { try { localStorage.setItem('fd_' + k, JSON.stringify(v)) } catch {} }
};

// ===== STATE =====
let tasks = LC.get('tasks') || [];
let docs = LC.get('docs') || [];
let sheets = LC.get('sheets') || [];
let worldClocks = LC.get('worldClocks') || [{ id: 'dhaka', city: 'Dhaka', tz: 'Asia/Dhaka' }];
let timerSessions = LC.get('timerSessions') || [];

let currentView = 'kanban';
let currentTask = null;
let sidebarCollapsed = false;
let calDate = new Date(), calViewMode = 'month';
let quillEditor = null, currentDocId = null, currentSheetId = null;
let sheetData = {}, selectedCell = { r: 0, c: 0 }, editingCell = null, sheetRows = 30, sheetCols = 10;

let qtTotal = 25 * 60, qtRemaining = 25 * 60, qtRunning = false, qtInterval = null;
let timerInterval = null, timerTotal = 0, timerRemaining = 0, timerRunning = false;

// ===== UTILS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2) }
function escHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }
function fmtDate(d) { if (!d) return ''; const [y,mo,dy] = d.split('-'); return `${dy}/${mo}/${y}`; }
function autoSlashDate(inp) {
  let v = inp.value.replace(/[^0-9]/g, '');
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
  if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5);
  inp.value = v.slice(0, 10);
}
function parseDateField(val) {
  if (!val) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  const m = val.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (!m) return '';
  return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
}
function displayDate(val) {
  if (!val) return '';
  const m = val.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return val;
  return `${m[3]}/${m[2]}/${m[1]}`;
}
function parseTimeField(val) {
  if (!val) return '';
  val = val.trim().replace(':', '');
  if (!/^\d{3,4}$/.test(val)) return '';
  const padded = val.padStart(4, '0');
  return `${padded.slice(0,2)}:${padded.slice(2)}`;
}
function displayTime(val) { return val ? val.replace(':', '') : ''; }

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'notification-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function saveData(changedCol, changedId, changedObj, deleted) {
  LC.set('tasks', tasks); LC.set('docs', docs); LC.set('sheets', sheets); LC.set('worldClocks', worldClocks); LC.set('timerSessions', timerSessions);
  if (changedCol && changedId) {
    if (deleted) { if (window.fbDel) fbDel(changedCol, changedId); }
    else if (changedObj) { if (window.fbSync) fbSync(changedCol, changedId, changedObj); }
  }
}

// ===== NAVIGATION =====
const titles = { kanban: 'Kanban View', docs: 'Docs View', sheets: 'Sheet View', calendar: 'Calendar View', clock: 'Clock View', timer: 'Timer View' };
function showView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(v + '-view').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const map = { kanban: 0, calendar: 1, docs: 2, sheets: 3, clock: 4, timer: 5 };
  if (document.querySelectorAll('.nav-item')[map[v]]) document.querySelectorAll('.nav-item')[map[v]].classList.add('active');
  document.getElementById('view-title').textContent = titles[v] || v;
  
  if (v === 'docs') renderDocsList();
  if (v === 'sheets') renderSheetsList();
  if (v === 'calendar') renderCalendar();
}

function topbarAction() {
  if (currentView === 'kanban' || currentView === 'calendar') openTaskModal();
  else if (currentView === 'docs') newDoc();
  else if (currentView === 'sheets') newSheet();
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
}

// ===== KANBAN =====
function renderKanban() {
  const b = document.getElementById('kanban-board');
  const cols = [{id:'todo', label:'Backlog'}, {id:'inprogress', label:'In Progress'}, {id:'done', label:'Done'}];
  b.innerHTML = cols.map(c => {
    const ts = tasks.filter(t => t.status === c.id);
    return `<div class="kanban-col">
      <div class="col-header">
        <div class="col-dot" style="background:var(--${c.id})"></div>
        <div class="col-title">${c.label}</div>
        <div class="col-count">${ts.length}</div>
      </div>
      <div class="col-cards">
        ${ts.map(t => `<div class="task-card" onclick="openTaskModal('${t.id}')">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">
            <span class="task-tag task-priority-${t.priority}">${t.priority}</span>
            ${t.due ? `<span class="task-due">${fmtDate(t.due)}</span>` : ''}
          </div>
        </div>`).join('')}
      </div>
      <button class="col-add-card" onclick="openTaskModal(null, '${c.id}')">+ Add Task</button>
    </div>`;
  }).join('');
}

// ===== TASKS =====
function openTaskModal(id, status = 'todo') {
  currentTask = id ? tasks.find(t => t.id === id) : null;
  const t = currentTask || { title: '', status, priority: 'medium', due: '', startDate: '', startTime: '', endTime: '', desc: '' };
  
  document.getElementById('task-title-input').value = t.title;
  document.getElementById('task-status').value = t.status;
  document.getElementById('task-priority').value = t.priority;
  document.getElementById('task-due').value = displayDate(t.due);
  document.getElementById('task-start-date').value = displayDate(t.startDate);
  document.getElementById('task-start-time').value = displayTime(t.startTime);
  document.getElementById('task-end-time').value = displayTime(t.endTime);
  document.getElementById('task-desc').value = t.desc;
  
  document.getElementById('delete-task-btn').style.display = id ? 'block' : 'none';
  document.getElementById('task-modal').style.display = 'flex';
}

function closeTaskModal() { document.getElementById('task-modal').style.display = 'none'; currentTask = null; }
function closeModalOnOverlay(e) { if (e.target === document.getElementById('task-modal')) closeTaskModal(); }

function saveTask() {
  const title = document.getElementById('task-title-input').value.trim();
  if (!title) return toast('Need task name');
  
  if (!currentTask) { currentTask = { id: uid() }; tasks.push(currentTask); }
  
  Object.assign(currentTask, {
    title,
    status: document.getElementById('task-status').value,
    priority: document.getElementById('task-priority').value,
    due: parseDateField(document.getElementById('task-due').value),
    startDate: parseDateField(document.getElementById('task-start-date').value),
    startTime: parseTimeField(document.getElementById('task-start-time').value),
    endTime: parseTimeField(document.getElementById('task-end-time').value),
    desc: document.getElementById('task-desc').value
  });
  
  saveData('tasks', currentTask.id, currentTask);
  renderKanban();
  if (currentView === 'calendar') renderCalendar();
  closeTaskModal();
}

function deleteCurrentTask() {
  tasks = tasks.filter(t => t.id !== currentTask.id);
  saveData('tasks', currentTask.id, null, true);
  renderKanban(); closeTaskModal();
}

// ===== DOCS =====
function renderDocsList() {
  document.getElementById('docs-list').style.display = '';
  document.getElementById('docs-editor').style.display = 'none';
  document.getElementById('docs-back-btn').style.display = 'none';
  
  if (!docs.length) { document.getElementById('docs-list').innerHTML = '<div class="empty-state">No docs yet</div>'; return; }
  
  document.getElementById('docs-list').innerHTML = `<div class="docs-grid">${docs.map(d => `
    <div class="doc-card" onclick="openDoc('${d.id}')">
      <div class="doc-card-title">${escHtml(d.title || 'Untitled')}</div>
      <div style="font-size:14px;color:var(--text3)">${new Date(d.createdAt).toLocaleDateString()}</div>
    </div>`).join('')}</div>`;
}

function newDoc() {
  const d = { id: uid(), title: 'New Doc', content: '', createdAt: Date.now() };
  docs.push(d); saveData('docs', d.id, d); openDoc(d.id);
}

function openDoc(id) {
  showView('docs'); currentDocId = id;
  const d = docs.find(x => x.id === id);
  document.getElementById('docs-list').style.display = 'none';
  document.getElementById('docs-editor').style.display = 'block';
  document.getElementById('docs-back-btn').style.display = 'block';
  document.getElementById('doc-title').value = d.title;
  
  if (!quillEditor) {
    quillEditor = new Quill('#editor-container', { theme: 'snow', placeholder: 'Write here...' });
    quillEditor.on('text-change', () => saveCurrentDoc());
  }
  quillEditor.root.innerHTML = d.content;
}

function docsBack() { saveCurrentDoc(); renderDocsList(); currentDocId = null; }
function saveCurrentDoc() {
  if (!currentDocId) return;
  const d = docs.find(x => x.id === currentDocId);
  d.title = document.getElementById('doc-title').value;
  d.content = quillEditor.root.innerHTML;
  saveData('docs', currentDocId, d);
}

// ===== SHEETS =====
function renderSheetsList() {
  document.getElementById('sheets-list').style.display = '';
  document.getElementById('sheets-editor').style.display = 'none';
  document.getElementById('sheets-back-btn').style.display = 'none';
  if (!sheets.length) { document.getElementById('sheets-list').innerHTML = '<div class="empty-state">No sheets</div>'; return; }
  
  document.getElementById('sheets-list').innerHTML = `<div class="docs-grid">${sheets.map(s => `
    <div class="doc-card" onclick="openSheet('${s.id}')">
      <div class="doc-card-title">${escHtml(s.title || 'Sheet')}</div>
    </div>`).join('')}</div>`;
}

function newSheet() {
  const s = { id: uid(), title: 'New Sheet', data: {}, rows: 20, cols: 8 };
  sheets.push(s); saveData('sheets', s.id, s); openSheet(s.id);
}

function openSheet(id) {
  showView('sheets'); currentSheetId = id;
  const s = sheets.find(x => x.id === id);
  document.getElementById('sheets-list').style.display = 'none';
  document.getElementById('sheets-editor').style.display = 'block';
  document.getElementById('sheets-back-btn').style.display = 'block';
  document.getElementById('sheet-title').value = s.title;
  sheetData = s.data || {}; sheetRows = s.rows || 20; sheetCols = s.cols || 8;
  renderSheet();
}

function sheetsBack() { renderSheetsList(); currentSheetId = null; }

function cellId(r, c) { return String.fromCharCode(65 + c) + (r + 1); }
function renderSheet() {
  const cols = Array.from({ length: sheetCols }, (_, i) => String.fromCharCode(65 + i));
  let html = `<table class="sheet-table"><thead><tr><th class="row-header"></th>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  for (let r = 0; r < sheetRows; r++) {
    html += `<tr><th class="row-header">${r + 1}</th>`;
    for (let c = 0; c < sheetCols; c++) {
      const v = sheetData[cellId(r, c)] || '';
      html += `<td onclick="selectCell(${r},${c})" ondblclick="startEdit(${r},${c})">${escHtml(String(v))}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('sheet-container').innerHTML = html;
}
function selectCell(r, c) { selectedCell = {r, c}; document.getElementById('cell-ref').textContent = cellId(r, c); document.getElementById('formula-input').value = sheetData[cellId(r,c)] || ''; }
function formulaBarInput(v) { sheetData[cellId(selectedCell.r, selectedCell.c)] = v; saveSheet(); renderSheet(); }
function startEdit(r, c) { selectCell(r, c); const v = prompt('Enter value:', sheetData[cellId(r,c)]||''); if(v !== null) formulaBarInput(v); }
function addSheetRow() { sheetRows++; saveSheet(); renderSheet(); }
function addSheetCol() { sheetCols++; saveSheet(); renderSheet(); }
function saveSheet() { const s = sheets.find(x=>x.id===currentSheetId); s.title=document.getElementById('sheet-title').value; s.data=sheetData; s.rows=sheetRows; s.cols=sheetCols; saveData('sheets', s.id, s); }

// ===== CALENDAR =====
function renderCalendar() {
  const d = document.getElementById('cal-grid');
  document.getElementById('cal-title').textContent = calDate.toLocaleDateString(undefined, {month:'long', year:'numeric'});
  
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const days = new Date(y, m + 1, 0).getDate();
  const first = new Date(y, m, 1).getDay();
  
  let html = `<div class="cal-month-grid">` + ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(x => `<div class="cal-day-header">${x}</div>`).join('');
  let day = 1 - first;
  for(let i=0; i<42; i++, day++) {
    const isCur = day > 0 && day <= days;
    const isToday = isCur && day === new Date().getDate() && m === new Date().getMonth() && y === new Date().getFullYear();
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const evts = isCur ? tasks.filter(t => t.due === ds || t.startDate === ds) : [];
    
    html += `<div class="cal-day ${isToday ? 'today' : ''} ${!isCur ? 'other-month' : ''}" onclick="openTaskModal(null, 'todo')">
      <div class="cal-day-num">${isCur ? day : ''}</div>
      ${evts.map(t => `<div class="cal-event" onclick="event.stopPropagation(); openTaskModal('${t.id}')">${escHtml(t.title)}</div>`).join('')}
    </div>`;
  }
  d.innerHTML = html + `</div>`;
}
function calNav(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }
function calToday() { calDate = new Date(); renderCalendar(); }
window.setCalView = function(v) { calViewMode = v; renderCalendar(); } // Kept minimal for code size

// ===== CLOCK =====
function updateClockView() {
  const now = new Date();
  const m = document.getElementById('local-time'); if(m) m.textContent = now.toLocaleTimeString(undefined, {hour12:false});
  const d = document.getElementById('local-date'); if(d) d.textContent = now.toDateString();
  const tm = document.getElementById('topbar-clock'); if(tm) tm.textContent = now.toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClockView, 1000);
function addWorldClock() { toast('World clock feature uses standard select'); }

// ===== QUICK TIMER =====
function qtTimerClick() {
  if (!qtRunning) {
    qtRunning = true; document.getElementById('topbar-qtimer').classList.add('running');
    qtInterval = setInterval(() => {
      qtRemaining--;
      if(qtRemaining <= 0) { clearInterval(qtInterval); qtRunning = false; qtRemaining = qtTotal; document.getElementById('topbar-qtimer').classList.remove('running'); toast('Timer Done!'); }
      document.getElementById('qt-input').value = Math.floor(qtRemaining/60) + ':' + String(qtRemaining%60).padStart(2,'0');
    }, 1000);
  } else { clearInterval(qtInterval); qtRunning = false; document.getElementById('topbar-qtimer').classList.remove('running'); }
}
function qtInputCommit(v) { qtTotal = parseInt(v)*60; qtRemaining = qtTotal; document.getElementById('qt-input').value = v + ':00'; }

// ===== MAIN TIMER =====
function timerStart() {
  if(timerRunning || timerTotal===0) return;
  timerRunning = true;
  timerInterval = setInterval(() => {
    timerRemaining--; updateTimerDisplay();
    if(timerRemaining <= 0) { clearInterval(timerInterval); timerRunning = false; toast('Focus Timer Complete!'); }
  }, 1000);
}
function timerPause() { clearInterval(timerInterval); timerRunning = false; }
function timerReset() { clearInterval(timerInterval); timerRunning = false; timerRemaining = timerTotal; updateTimerDisplay(); }
function setCustomTimer() {
  const m = parseInt(document.getElementById('custom-m').value) || 25;
  timerTotal = m * 60; timerRemaining = timerTotal; updateTimerDisplay();
}
function updateTimerDisplay() {
  const m = Math.floor(timerRemaining/60), s = timerRemaining%60;
  document.getElementById('timer-display').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pct = timerTotal ? timerRemaining / timerTotal : 1;
  const el = document.getElementById('timer-ring-fg'); if (el) el.style.strokeDashoffset = (2 * Math.PI * 100) * (1 - pct);
}

// ===== INIT =====
function initApp() {
  renderKanban(); updateClockView(); setCustomTimer();
  document.getElementById('app').style.display='flex';
}
if (typeof onAuthStateChanged === 'undefined') initApp(); // offline mode
</script>
